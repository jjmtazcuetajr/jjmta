name: 'Unit Tests (Vitest)'

on:
  push:
    branches:
      - main
    paths:
      - 'src/utils/form-utils.ts'
      - 'src/components/Contact.astro'
  pull_request:
    branches:
      - main
    paths:
      - 'src/utils/form-utils.ts'
      - 'src/components/Contact.astro'

jobs:
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test
